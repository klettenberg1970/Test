<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Währungsumrechner</title>
</head>
<body>
    <input type="number" id="amount" placeholder="Betrag eingeben" value="1">
    <button id="umrechnen">Umrechnen</button>
    <p id="ergebnis"></p>

    <script>
        var btn = document.getElementById("umrechnen");
        btn.addEventListener("click", function() {
            var amountInput = document.getElementById("amount");
            var amount = parseFloat(amountInput.value);
            convert("EUR", "USD", amount);
        });

        function convert(from, to, amount) {
            fetch(`https://api.frankfurter.dev/v1/latest?base=${from}&symbols=${to}`)
                .then((resp) => resp.json())
                .then((data) => {
                    const convertedAmount = (amount * data.rates[to]).toFixed(3);
                    const ergebnisText = `${amount} ${from} = ${convertedAmount} ${to}`;
                    document.getElementById('ergebnis').textContent = ergebnisText;
                    // document.write("Euro in Dollar");
                })
                .catch((error) => {
                    console.error("Fehler beim Abrufen der Wechselkurse:", error);
                    document.getElementById('ergebnis').textContent = "Fehler beim Abrufen der Wechselkurse.";
                });
        }
    </script>
</body>
</html>
