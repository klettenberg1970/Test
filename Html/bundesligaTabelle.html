<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bundesliga</title>
    <style>
   body {
    background-color: whitesmoke;
    font-family: Arial, Helvetica, sans-serif;
}

.bundesliga-container {
    background-color: white;  /* ← WICHTIG: Weißer Hintergrund */
    margin: 2rem auto;
    padding: 2rem;
    width: 80%;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    border-radius: 8px;
}

h1 {
    text-align: center;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    border: 1px solid #ddd;
    text-align: center;
}

th {
    background-color: #1a5f7a;
    color: white;
}

tbody tr:nth-child(even) {
    background-color: #f9f9f9;
}

/* Für alle Bildschirme unter 768px Breite */
@media (max-width: 768px) {
    .bundesliga-container {
        width: 95%;           /* Statt 80% mehr Platz auf dem Handy */
        padding: 1rem;        /* Weniger Innenabstand */
        margin: 1rem auto;
        overflow-x: auto;     /* Wichtig: Scrollbar bei Bedarf */
    }
    
    table {
        min-width: 500px;     /* Verhindert, dass die Tabelle zu stark zusammengedrückt wird */
    }
    
    th, td {
        padding: 8px 4px;     /* Weniger Padding auf Handys */
        font-size: 12px;      /* Kleinere Schrift */
    }
    
    h1 {
        font-size: 1.5rem;
    }
}


    </style>
</head>

<body>

    <div class="bundesliga-container">
        <h1> Bundesliga-Tabelle</h1>
        <hr>

        <table >
            <thead>
                <tr>
                    <th>Platz</th>
                    <th>Name</th>
                    <th>Punkte</th>
                    <th>Tordifferenz</th>
                </tr>
            </thead>
            <tbody id="tbody">

            </tbody>


        </table>


    </div>
    <script>
        const liga = 'bl1';
        const jahr = 2025;

        const tbody = document.querySelector('#tbody')
        let zaehler = 0


        const fetchTabelle = async (liga, jahr) => {
            const url = `https://api.openligadb.de/getbltable/${liga}/${jahr}`;
            const response = await fetch(url);
            const daten = await response.json();
            return daten;
        }

        const main = async () => {
            const ligadaten = await fetchTabelle(liga, jahr);


            for (const verein of ligadaten) {
                const zeile = document.createElement('tr');

                // Platz
                const platzZelle = document.createElement('td');
                platzZelle.innerText = zaehler + 1;
                zeile.appendChild(platzZelle);
                zaehler++;

                // Name
                const nameZelle = document.createElement('td');
                nameZelle.innerText = verein.teamName;
                zeile.appendChild(nameZelle);

                // Punkte
                const punkteZelle = document.createElement('td');
                punkteZelle.innerText = verein.points;
                zeile.appendChild(punkteZelle);

                // Tordifferenz
                const tdZelle = document.createElement('td');
                tdZelle.innerText = verein.goalDiff;
                zeile.appendChild(tdZelle);

                tbody.appendChild(zeile);
            }


        }
        main();

    </script>
</body>

</html>
