<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="quiz.css">
    <title>Quiz</title>
</head>

<body>

<h1>Quiz</h1>
    <div class="lade-anzeige">
        <p>⏳ Seite wird geladen...</p>
    </div>

    <div class="quiz-container" style="display: none;">

        <div class="quiz-card">
            <div class="kopf">
                <h3 class="thema">Thema</h3>
                <p class="level">Schwierigkeit</p>

            </div>

            <hr>
            <div class="fragen-container">


                <p class="frage">Frage</p>
                <button class="option"> 1</button>
                <button class="option"> 2</button>
                <button class="option"> 3</button>
                <button class="option"> 4</button>

            </div>

        </div>
        <div class="fuss">

            <div class="loesung">
                <h3 class="meldung"></h3>
                <hr>
                <p class="antwort"></p>
                <hr>
                <p class="erklaertext"> </p>
                <hr>
            </div>
        </div>
        <button class="weiter">Nächste Frage</button>
    </div>

    <script src="quiz.js" type="module"></script>
</body>

</html>
