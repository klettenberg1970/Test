<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taschenrechner</title>
    <link rel="stylesheet" href="taschenrechner.css">
    <script src="taschenrechner.js" defer></script>
</head>

<body>
    <nav>
        <h1>Taschenrechner</h1>
    </nav>
    <main>
        <input type="text" id="display" readonly>

     <div class="Tastenfeld"> <!-- Container (Klasse kann umbenannt werden, z. B. "TastenContainer") -->
    <button class="Tasten">(</button>
    <button class="Tasten">)</button>
    <button class="Tasten">E</button>
    <button class="Tasten">C</button>
    <button class="Tasten">7</button>
    <button class="Tasten">8</button>
    <button class="Tasten">9</button>
    <button class="Tasten">/</button>
    <button class="Tasten">4</button>
    <button class="Tasten">5</button>
    <button class="Tasten">6</button>
    <button class="Tasten">*</button>
    <button class="Tasten">1</button>
    <button class="Tasten">2</button>
    <button class="Tasten">3</button>
    <button class="Tasten">-</button>
    <button class="Tasten">0</button>
    <button class="Tasten">.</button>
    <button class="Tasten">=</button>
    <button class="Tasten">+</button>
</div>





    </main>

</body>

</html>
